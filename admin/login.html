<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Amon Heights</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c41e3a;
            --black: #0a0a0a;
            --white: #ffffff;
            --grey: #666666;
            --light-grey: #f5f5f5;
            --border: #e0e0e0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            color: var(--black);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .login-header {
            background: var(--primary);
            color: var(--white);
            padding: 3rem 2rem;
            text-align: center;
        }

        .login-logo {
            height: 50px;
            width: auto;
            margin-bottom: 1.5rem;
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.9rem;
            opacity: 0.95;
        }

        .login-body {
            padding: 2.5rem 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 200ms ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(196,30,58,0.1);
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 200ms ease;
            margin-top: 0.5rem;
        }

        .login-button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(196,30,58,0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .message {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            font-weight: 600;
            display: none;
            border-left: 4px solid;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left-color: #f44336;
        }

        .message.success {
            background: #e8f5e9;
            color: #1b5e20;
            border-left-color: #4caf50;
        }

        .login-info {
            background: var(--light-grey);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--grey);
            text-align: center;
        }

        .login-info strong {
            color: var(--black);
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 8px;
            }

            .login-header {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .login-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <img src="../Images/logo.png" alt="Amon Heights" class="login-logo">
        <h1>Admin Portal</h1>
        <p>Amon Heights Management System</p>
    </div>

    <div class="login-body">
        <div id="message" class="message"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Email Address</label>
                <input 
                    type="email" 
                    id="username" 
                    placeholder="admin@amonheights.com" 
                    required 
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••" 
                    required
                >
            </div>

            <button type="submit" class="login-button">Sign In</button>
        </form>

        <div class="login-info">
            <strong>Demo Credentials:</strong><br>
            Email: admin@amonheights.com<br>
            Password: amonheights2024
        </div>
    </div>
</div>

<script>
    function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const message = document.getElementById('message');

        // Simple credentials (for demo - in production use proper auth)
        const VALID_EMAIL = 'admin@amonheights.com';
        const VALID_PASSWORD = 'amonheights2024';

        message.classList.remove('show', 'error', 'success');

        if (email === VALID_EMAIL && password === VALID_PASSWORD) {
            message.textContent = 'Login successful! Redirecting...';
            message.className = 'message show success';
            
            // Set session
            sessionStorage.setItem('adminLoggedIn', 'true');
            sessionStorage.setItem('adminEmail', email);

            // Redirect after 500ms
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        } else {
            message.textContent = 'Invalid email or password';
            message.className = 'message show error';
        }
    }
</script>

</body>
</html>
