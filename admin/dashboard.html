<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Amon Heights</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c41e3a;
            --black: #0a0a0a;
            --white: #ffffff;
            --grey: #666666;
            --light-grey: #f5f5f5;
            --border: #e0e0e0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light-grey);
            color: var(--black);
            line-height: 1.6;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 100;
        }

        .header-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--black);
            font-size: 1.3rem;
            font-weight: 800;
        }

        .logo-section img {
            height: 36px;
            width: auto;
        }

        .nav-tabs {
            display: flex;
            gap: 0;
            flex: 1;
            justify-content: center;
        }

        .nav-tab {
            background: none;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: var(--grey);
            border-bottom: 3px solid transparent;
            transition: all 200ms ease;
        }

        .nav-tab:hover {
            color: var(--black);
        }

        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .logout-btn {
            padding: 0.7rem 1.5rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }

        /* CONTAINER */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* SECTIONS */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-header {
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .section-header p {
            color: var(--grey);
            font-size: 0.95rem;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 200ms ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(196,30,58,0.1);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 200ms ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: var(--white);
            color: var(--black);
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: #ffebee;
            color: #c62828;
            border: 1.5px solid #ffcdd2;
        }

        .btn-danger:hover {
            background: #f5b3ba;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 200ms ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--light-grey);
        }

        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(196,30,58,0.1);
            color: var(--primary);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            width: fit-content;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
            line-height: 1.3;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--grey);
            margin-bottom: 1rem;
        }

        .card-excerpt {
            font-size: 0.95rem;
            color: var(--grey);
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-actions {
            display: flex;
            gap: 0.6rem;
        }

        .card-actions .btn {
            flex: 1;
            padding: 0.6rem;
            font-size: 0.85rem;
        }

        /* FORM */
        .form-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 200ms ease;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(196,30,58,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        .form-actions .btn {
            flex: 1;
        }

        /* MESSAGE */
        .message {
            padding: 1rem 1.5rem;
            border-radius: 6px;
            margin-bottom: 2rem;
            display: none;
            border-left: 4px solid;
            font-weight: 600;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #e8f5e9;
            color: #1b5e20;
            border-left-color: #4caf50;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left-color: #f44336;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--grey);
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 8px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: flex-end;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header-wrapper {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-tabs {
                width: 100%;
                justify-content: space-around;
            }

            .container {
                padding: 1.5rem;
            }

            .section-header h2 {
                font-size: 1.8rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-wrapper">
        <a href="../public/index.html" class="logo-section">
            <img src="../Images/logo.png" alt="Amon Heights">
            <span>Admin</span>
        </a>
        <nav class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('posts')">📝 Blog Posts</button>
            <button class="nav-tab" onclick="switchTab('properties')">🏠 Properties</button>
        </nav>
        <button class="logout-btn" onclick="confirmLogout()">Logout</button>
    </div>
</header>

<!-- CONTAINER -->
<div class="container">

    <!-- MESSAGE -->
    <div id="message" class="message"></div>

    <!-- BLOG POSTS SECTION -->
    <section id="posts" class="section active">
        <div class="section-header">
            <h2>Blog Posts</h2>
            <p>Manage your blog content</p>
        </div>

        <div class="controls">
            <input type="text" class="search-input" id="searchPosts" placeholder="Search posts..." onkeyup="filterPosts()">
            <button class="btn btn-primary" onclick="openNewPostModal()">+ New Post</button>
        </div>

        <div id="postsGrid" class="grid"></div>
        <div id="postsEmpty" class="empty-state" style="display: none;">
            <p>📝 No blog posts yet</p>
            <button class="btn btn-primary" onclick="openNewPostModal()">Create First Post</button>
        </div>
    </section>

    <!-- PROPERTIES SECTION -->
    <section id="properties" class="section">
        <div class="section-header">
            <h2>Properties</h2>
            <p>Manage property listings</p>
        </div>

        <div class="controls">
            <input type="text" class="search-input" id="searchProperties" placeholder="Search properties..." onkeyup="filterProperties()">
            <button class="btn btn-primary" onclick="openNewPropertyModal()">+ New Property</button>
        </div>

        <div id="propertiesGrid" class="grid"></div>
        <div id="propertiesEmpty" class="empty-state" style="display: none;">
            <p>🏠 No properties yet</p>
            <button class="btn btn-primary" onclick="openNewPropertyModal()">Add First Property</button>
        </div>
    </section>

</div>

<!-- POST MODAL -->
<div id="postModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="postModalTitle">New Post</div>
        <form onsubmit="savePost(event)">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="postTitle" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Author *</label>
                    <input type="text" id="postAuthor" required>
                </div>
                <div class="form-group">
                    <label>Date *</label>
                    <input type="date" id="postDate" required>
                </div>
            </div>
            <div class="form-group">
                <label>Image URL *</label>
                <input type="url" id="postImage" required>
            </div>
            <div class="form-group">
                <label>Excerpt *</label>
                <textarea id="postExcerpt" required></textarea>
            </div>
            <div class="form-group">
                <label>Content *</label>
                <textarea id="postContent" required style="min-height: 150px;"></textarea>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn btn-secondary" onclick="closePostModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Post</button>
            </div>
        </form>
    </div>
</div>

<!-- PROPERTY MODAL -->
<div id="propertyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="propertyModalTitle">New Property</div>
        <form onsubmit="saveProperty(event)">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="propertyTitle" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Type *</label>
                    <select id="propertyType" required>
                        <option value="">Select Type</option>
                        <option value="apartment">Apartment</option>
                        <option value="villa">Villa</option>
                        <option value="duplex">Duplex</option>
                        <option value="shortlet">Shortlet</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location *</label>
                    <input type="text" id="propertyLocation" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price *</label>
                    <input type="text" id="propertyPrice" required>
                </div>
                <div class="form-group">
                    <label>Rating</label>
                    <input type="number" id="propertyRating" step="0.1" min="0" max="5" value="4.9">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Bedrooms</label>
                    <input type="number" id="propertyBeds" value="3">
                </div>
                <div class="form-group">
                    <label>Bathrooms</label>
                    <input type="number" id="propertyBaths" value="2">
                </div>
            </div>
            <div class="form-group">
                <label>Size (sqm) *</label>
                <input type="text" id="propertySize" required>
            </div>
            <div class="form-group">
                <label>Image URL *</label>
                <input type="url" id="propertyImage" required>
            </div>
            <div class="form-group">
                <label>Description *</label>
                <textarea id="propertyDesc" required></textarea>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn btn-secondary" onclick="closePropertyModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Property</button>
            </div>
        </form>
    </div>
</div>

<!-- DELETE CONFIRMATION MODAL -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Confirm Delete</div>
        <p id="deleteMessage" style="margin-bottom: 1.5rem; color: var(--grey);">Are you sure you want to delete this item?</p>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<script>
    // ========================
    // ADMIN DASHBOARD SCRIPT
    // ========================

    let blogPosts = [];
    let properties = [];
    let editingPostId = null;
    let editingPropertyId = null;
    let deleteItem = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        checkAuth();
        loadData();
        renderPosts();
        renderProperties();
    });

    // Authentication
    function checkAuth() {
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
    }

    function confirmLogout() {
        if (confirm('Are you sure you want to logout?')) {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminEmail');
            window.location.href = 'login.html';
        }
    }

    // Load data from localStorage
    function loadData() {
        const stored = localStorage.getItem('amonHeightsBlogPosts');
        const storedProps = localStorage.getItem('amonHeightsProperties');

        if (stored) {
            blogPosts = JSON.parse(stored);
        } else {
            blogPosts = [
                {
                    id: 1,
                    title: "Luxury Living in Abuja: A Guide to Premium Neighborhoods",
                    author: "Sarah Johnson",
                    date: "2024-01-15",
                    image: "Images/abuja.jpg",
                    excerpt: "Discover the most exclusive neighborhoods offering world-class living experiences and investment opportunities.",
                    content: "Abuja's premium neighborhoods offer unparalleled luxury and convenience. From Maitama to Asokoro, each area provides unique advantages for investors and residents seeking high-end properties. This comprehensive guide covers lifestyle, amenities, investment potential, and what makes each location special."
                },
                {
                    id: 2,
                    title: "Investment Guide: Why Nigerian Real Estate is the Future",
                    author: "Michael Chen",
                    date: "2024-01-10",
                    image: "Images/living room 2.jpg",
                    excerpt: "Explore compelling reasons why intelligent investors are focusing on Nigerian property markets.",
                    content: "Nigerian real estate presents exceptional investment opportunities with strong growth potential. Economic development, increasing urbanization, rising demand for premium housing, and favorable demographics create a perfect storm of opportunity."
                },
                {
                    id: 3,
                    title: "Interior Design Trends: Creating the Perfect Luxury Home",
                    author: "Emma Williams",
                    date: "2024-01-05",
                    image: "Images/living room 1.jpg",
                    excerpt: "Master the art of luxury interior design with insights from top designers in Africa.",
                    content: "Contemporary luxury design blends comfort with sophistication. Discover how to incorporate minimalism, natural materials, smart technology, and sustainable elements into your dream home."
                }
            ];
            saveData();
        }

        if (storedProps) {
            properties = JSON.parse(storedProps);
        } else {
            properties = [
                { id: 1, title: "Luxury Penthouse", type: "apartment", location: "Maitama", price: "850M", rating: "4.95", image: "Images/living room 2.jpg", beds: 4, baths: 3, size: "450 sqm", desc: "Stunning luxury apartment with premium finishes and breathtaking views." },
                { id: 2, title: "Executive Villa", type: "villa", location: "Asokoro", price: "1.2B", rating: "4.88", image: "Images/duplex and pool outdoor 1.jpg", beds: 5, baths: 4, size: "650 sqm", desc: "Contemporary villa with state-of-the-art features in exclusive neighborhood." },
                { id: 3, title: "Premium Duplex", type: "duplex", location: "Wuse II", price: "750M", rating: "4.92", image: "Images/duplex.jpg", beds: 4, baths: 3, size: "520 sqm", desc: "Spacious duplex with modern architecture and premium finishes." }
            ];
            saveDataProperties();
        }
    }

    function saveData() {
        localStorage.setItem('amonHeightsBlogPosts', JSON.stringify(blogPosts));
    }

    function saveDataProperties() {
        localStorage.setItem('amonHeightsProperties', JSON.stringify(properties));
    }

    // Tab switching
    function switchTab(tab) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');
    }

    // ========================
    // BLOG POSTS
    // ========================

    function renderPosts(data = blogPosts) {
        const grid = document.getElementById('postsGrid');
        const empty = document.getElementById('postsEmpty');

        if (data.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        grid.innerHTML = data.map(post => `
            <div class="card">
                <img src="${post.image}" alt="${post.title}" class="card-image" onerror="this.style.background='#f0f0f0'">
                <div class="card-body">
                    <div class="card-badge">Blog Post</div>
                    <div class="card-title">${post.title}</div>
                    <div class="card-meta"><strong>${post.author}</strong> • ${post.date}</div>
                    <div class="card-excerpt">${post.excerpt}</div>
                    <div class="card-actions">
                        <button class="btn btn-secondary" onclick="editPost(${post.id})">Edit</button>
                        <button class="btn btn-danger" onclick="openDeleteModal('post', ${post.id})">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openNewPostModal() {
        editingPostId = null;
        document.getElementById('postModalTitle').textContent = 'New Post';
        document.getElementById('postTitle').value = '';
        document.getElementById('postAuthor').value = '';
        document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('postImage').value = '';
        document.getElementById('postExcerpt').value = '';
        document.getElementById('postContent').value = '';
        document.getElementById('postModal').classList.add('show');
    }

    function editPost(id) {
        const post = blogPosts.find(p => p.id === id);
        if (!post) return;

        editingPostId = id;
        document.getElementById('postModalTitle').textContent = 'Edit Post';
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postAuthor').value = post.author;
        document.getElementById('postDate').value = post.date;
        document.getElementById('postImage').value = post.image;
        document.getElementById('postExcerpt').value = post.excerpt;
        document.getElementById('postContent').value = post.content;
        document.getElementById('postModal').classList.add('show');
    }

    function savePost(e) {
        e.preventDefault();

        const postData = {
            title: document.getElementById('postTitle').value,
            author: document.getElementById('postAuthor').value,
            date: document.getElementById('postDate').value,
            image: document.getElementById('postImage').value,
            excerpt: document.getElementById('postExcerpt').value,
            content: document.getElementById('postContent').value
        };

        if (editingPostId) {
            const post = blogPosts.find(p => p.id === editingPostId);
            if (post) {
                Object.assign(post, postData);
                showMessage('Post updated successfully', 'success');
            }
        } else {
            blogPosts.unshift({
                id: Date.now(),
                ...postData
            });
            showMessage('Post created successfully', 'success');
        }

        saveData();
        renderPosts();
        closePostModal();
    }

    function closePostModal() {
        document.getElementById('postModal').classList.remove('show');
    }

    function filterPosts() {
        const query = document.getElementById('searchPosts').value.toLowerCase();
        const filtered = blogPosts.filter(p =>
            p.title.toLowerCase().includes(query) ||
            p.author.toLowerCase().includes(query)
        );
        renderPosts(filtered);
    }

    // ========================
    // PROPERTIES
    // ========================

    function renderProperties(data = properties) {
        const grid = document.getElementById('propertiesGrid');
        const empty = document.getElementById('propertiesEmpty');

        if (data.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        grid.innerHTML = data.map(prop => `
            <div class="card">
                <img src="${prop.image}" alt="${prop.title}" class="card-image" onerror="this.style.background='#f0f0f0'">
                <div class="card-body">
                    <div class="card-badge">${prop.type}</div>
                    <div class="card-title">${prop.title}</div>
                    <div class="card-meta">${prop.location} • ₦${prop.price}</div>
                    <div class="card-excerpt">${prop.desc}</div>
                    <div class="card-actions">
                        <button class="btn btn-secondary" onclick="editProperty(${prop.id})">Edit</button>
                        <button class="btn btn-danger" onclick="openDeleteModal('property', ${prop.id})">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openNewPropertyModal() {
        editingPropertyId = null;
        document.getElementById('propertyModalTitle').textContent = 'New Property';
        document.getElementById('propertyTitle').value = '';
        document.getElementById('propertyType').value = '';
        document.getElementById('propertyLocation').value = '';
        document.getElementById('propertyPrice').value = '';
        document.getElementById('propertyRating').value = '4.9';
        document.getElementById('propertyBeds').value = '3';
        document.getElementById('propertyBaths').value = '2';
        document.getElementById('propertySize').value = '';
        document.getElementById('propertyImage').value = '';
        document.getElementById('propertyDesc').value = '';
        document.getElementById('propertyModal').classList.add('show');
    }

    function editProperty(id) {
        const prop = properties.find(p => p.id === id);
        if (!prop) return;

        editingPropertyId = id;
        document.getElementById('propertyModalTitle').textContent = 'Edit Property';
        document.getElementById('propertyTitle').value = prop.title;
        document.getElementById('propertyType').value = prop.type;
        document.getElementById('propertyLocation').value = prop.location;
        document.getElementById('propertyPrice').value = prop.price;
        document.getElementById('propertyRating').value = prop.rating;
        document.getElementById('propertyBeds').value = prop.beds;
        document.getElementById('propertyBaths').value = prop.baths;
        document.getElementById('propertySize').value = prop.size;
        document.getElementById('propertyImage').value = prop.image;
        document.getElementById('propertyDesc').value = prop.desc;
        document.getElementById('propertyModal').classList.add('show');
    }

    function saveProperty(e) {
        e.preventDefault();

        const propData = {
            title: document.getElementById('propertyTitle').value,
            type: document.getElementById('propertyType').value,
            location: document.getElementById('propertyLocation').value,
            price: document.getElementById('propertyPrice').value,
            rating: document.getElementById('propertyRating').value,
            beds: parseInt(document.getElementById('propertyBeds').value),
            baths: parseInt(document.getElementById('propertyBaths').value),
            size: document.getElementById('propertySize').value,
            image: document.getElementById('propertyImage').value,
            desc: document.getElementById('propertyDesc').value
        };

        if (editingPropertyId) {
            const prop = properties.find(p => p.id === editingPropertyId);
            if (prop) {
                Object.assign(prop, propData);
                showMessage('Property updated successfully', 'success');
            }
        } else {
            properties.unshift({
                id: Date.now(),
                ...propData
            });
            showMessage('Property created successfully', 'success');
        }

        saveDataProperties();
        renderProperties();
        closePropertyModal();
    }

    function closePropertyModal() {
        document.getElementById('propertyModal').classList.remove('show');
    }

    function filterProperties() {
        const query = document.getElementById('searchProperties').value.toLowerCase();
        const filtered = properties.filter(p =>
            p.title.toLowerCase().includes(query) ||
            p.location.toLowerCase().includes(query)
        );
        renderProperties(filtered);
    }

    // ========================
    // DELETE
    // ========================

    function openDeleteModal(type, id) {
        deleteItem = { type, id };
        const item = type === 'post' ? blogPosts.find(p => p.id === id) : properties.find(p => p.id === id);
        document.getElementById('deleteMessage').textContent = `Are you sure you want to delete "${item.title}"?`;
        document.getElementById('deleteModal').classList.add('show');
    }

    function closeDeleteModal() {
        deleteItem = null;
        document.getElementById('deleteModal').classList.remove('show');
    }

    function confirmDelete() {
        if (!deleteItem) return;

        if (deleteItem.type === 'post') {
            blogPosts = blogPosts.filter(p => p.id !== deleteItem.id);
            saveData();
            renderPosts();
            showMessage('Post deleted successfully', 'success');
        } else {
            properties = properties.filter(p => p.id !== deleteItem.id);
            saveDataProperties();
            renderProperties();
            showMessage('Property deleted successfully', 'success');
        }

        closeDeleteModal();
    }

    // ========================
    // UTILITIES
    // ========================

    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message show ${type}`;
        setTimeout(() => {
            msg.classList.remove('show');
        }, 3000);
    }

    // Close modals on background click
    document.addEventListener('click', (e) => {
        if (e.target.id === 'postModal') document.getElementById('postModal').classList.remove('show');
        if (e.target.id === 'propertyModal') document.getElementById('propertyModal').classList.remove('show');
        if (e.target.id === 'deleteModal') document.getElementById('deleteModal').classList.remove('show');
    });
</script>

</body>
</html>
