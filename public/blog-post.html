<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .blog-post-section { padding: 4rem 2rem; max-width: 800px; margin: 0 auto; }
        .blog-post-full { margin-top: 2rem; }
        .blog-post-image { width: 100%; height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 2rem; }
        .blog-post-full h1 { font-size: 2.2rem; color: var(--black); margin-bottom: 1rem; line-height: 1.3; }
        .blog-post-meta { color: var(--grey-text); font-size: 1rem; margin-bottom: 2rem; }
        .blog-post-body { font-size: 1.05rem; line-height: 1.8; color: #333; margin-bottom: 2rem; }
        .blog-post-body p { margin-bottom: 1.5rem; }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 500; display: inline-block; margin-top: 2rem; }
        .back-link:hover { color: var(--primary-hover); }
        .post-placeholder { text-align: center; padding: 4rem 2rem; color: var(--grey-text); }
    </style>
</head>

    </header>

    <section class="blog-post-section">

        </div>

    <!-- Footer -->

                <h4>Company</h4>

                <a href="careers.html">Careers</a>

                <a href="press.html">Press</a>

            <div class="footer-column">

                <a href="help.html">Help Center</a>
                <a href="contact.html">Contact Us</a>
                <a href="terms.html">Terms</a>
                <a href="privacy.html">Privacy</a>
            </div>
            <div class="footer-column">
